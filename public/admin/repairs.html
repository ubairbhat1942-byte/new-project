<!DOCTYPE html>

          <li class="sidebar__item">
            <a href="products.html" class="sidebar__link">
              <span class="sidebar__icon">📦</span> Products
            </a>
          </li>
          <li class="sidebar__item sidebar__item--active">
            <a href="repairs.html" class="sidebar__link" aria-current="page">
              <span class="sidebar__icon">🔧</span> Repairs
            </a>
          </li>
          <li class="sidebar__item sidebar__item--divider">
            <a href="../index.html" class="sidebar__link">
              <span class="sidebar__icon">🌐</span> Customer Site
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar__footer">
        <p class="sidebar__user">Logged in as <strong>Towhead</strong></p>

      </div>

    <!-- ───── Main Content ───── -->
    <main class="admin-main">
      <header class="admin-header">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
        <h1 class="admin-header__title">Manage Repairs</h1>
        <button class="btn btn--primary" id="add-repair-btn">+ New Repair Order</button>
      </header>

      <!-- Filters -->
      <section class="filters-bar" aria-label="Repair filters">
        <div class="filter-group">
          <label for="filter-status" class="sr-only">Filter by status</label>
          <select id="filter-status" class="form-select">
            <option value="">All Statuses</option>
            <option value="Received">Received</option>
            <option value="Diagnosing">Diagnosing</option>
            <option value="Repairing">Repairing</option>
            <option value="Testing">Testing</option>
            <option value="Ready">Ready</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>

        <div class="filter-group filter-group--search">
          <label for="search-repairs" class="sr-only">Search by customer phone</label>
          <input
            type="search"
            id="search-repairs"
            class="form-input"
            placeholder="🔍 Search by customer phone…"
          >
        </div>
      </section>

      <!-- Repairs List (Card Layout) -->

          <!-- Empty State -->
          <div class="empty-state" id="repairs-empty-state">
            <span class="empty-state__icon">🔧</span>
            <p>No repair orders yet. Create your first repair order!</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ───── Add / Edit Repair Modal ───── -->
  <div class="modal-overlay" id="repair-modal" role="dialog" aria-modal="true" aria-labelledby="repair-modal-title" hidden>
    <div class="modal-card glass-card">
      <header class="modal-header">
        <h2 class="modal-title" id="repair-modal-title">New Repair Order</h2>
        <button class="modal-close" id="repair-modal-close" aria-label="Close modal">&times;</button>
      </header>

      <form id="repair-form" class="modal-body" novalidate>
        <input type="hidden" id="repair-id" name="repairId">

        <div class="form-row">
          <div class="form-group">
            <label for="customer-name" class="form-label">Customer Name <span class="required">*</span></label>
            <input type="text" id="customer-name" name="customerName" class="form-input" placeholder="e.g. Rahul Sharma" required>
          </div>

          <div class="form-group">
            <label for="customer-phone" class="form-label">Customer Phone <span class="required">*</span></label>
            <input type="tel" id="customer-phone" name="customerPhone" class="form-input" placeholder="e.g. 9876543210" pattern="[0-9]{10}" maxlength="10" required>
          </div>
        </div>

        <div class="form-group">
          <label for="device-name" class="form-label">Device Name <span class="required">*</span></label>
          <input type="text" id="device-name" name="deviceName" class="form-input" placeholder="e.g. Samsung Galaxy M34 5G" required>
        </div>

        <div class="form-group">
          <label for="issue-description" class="form-label">Issue Description <span class="required">*</span></label>
          <textarea id="issue-description" name="issueDescription" class="form-textarea" rows="3" placeholder="Describe the issue…" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="estimated-cost" class="form-label">Estimated Cost (₹)</label>
            <input type="number" id="estimated-cost" name="estimatedCost" class="form-input" placeholder="e.g. 2500" min="0" step="1">
          </div>

          <div class="form-group">
            <label for="expected-date" class="form-label">Expected Completion</label>
            <input type="date" id="expected-date" name="expectedDate" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label for="repair-status" class="form-label">Status</label>
          <select id="repair-status" name="status" class="form-select">
            <option value="Received" selected>Received</option>
            <option value="Diagnosing">Diagnosing</option>
            <option value="Repairing">Repairing</option>
            <option value="Testing">Testing</option>
            <option value="Ready">Ready</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>

        <div class="form-group">
          <label for="repair-notes" class="form-label">Notes</label>
          <textarea id="repair-notes" name="notes" class="form-textarea" rows="3" placeholder="Internal notes (not visible to customer)…"></textarea>
        </div>
      </form>

      <footer class="modal-footer">
        <button type="button" class="btn btn--outline" id="repair-modal-cancel">Cancel</button>
        <button type="submit" form="repair-form" class="btn btn--primary" id="repair-save-btn">Save Repair</button>
      </footer>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
